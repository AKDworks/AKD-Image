<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Удаление метаданных (EXIF) — AKD Image</title>
  <meta name="description" content="Удаляйте EXIF и другие метаданные из JPG, PNG и WebP путем локального пересохранения изображения в браузере.">
  <link rel="canonical" href="https://akdimage.vercel.app/exif">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/main.css?v=5">
</head>
<body>

<script src="/js/layout.js?v=7"></script>

<main>
  <div class="container container--narrow tool-page">

    <div class="tool-page__header">
      <h1 class="tool-page__title">Удаление метаданных (EXIF)</h1>
      <p class="tool-page__subtitle">Очистите изображения от геолокации, данных камеры и другой скрытой информации перед публикацией.</p>
    </div>

    <div class="dropzone" id="dropzone">
      <input type="file" accept="image/jpeg,image/png,image/webp" multiple>
      <p class="dropzone__title">Перетащите изображения сюда</p>
      <p class="dropzone__hint">или нажмите для выбора файлов</p>
      <div class="dropzone__formats">
        <span class="fmt-badge">JPG</span>
        <span class="fmt-badge">PNG</span>
        <span class="fmt-badge">WEBP</span>
      </div>
    </div>

    <div class="tool-panel hidden" id="settings-panel">
      <div class="tool-panel__head">
        <h3>Настройки сохранения</h3>
        <button class="btn btn-sm btn-secondary" id="clear-btn">Выбрать другой файл</button>
      </div>
      <div class="tool-panel__body">
        
        <div class="form-group">
          <label>Качество сохранения (для JPG и WebP)</label>
          <div class="range-row">
            <input type="range" id="quality" min="50" max="100" value="100">
            <span id="quality-val">100%</span>
          </div>
          <p class="text-muted text-sm mt-8">EXIF удаляется автоматически при пересохранении изображения.</p>
        </div>

        <button class="btn btn-secondary mt-16 hidden" id="preview-btn">Предпросмотр выбранного изображения</button>
        <canvas class="preview-canvas hidden" id="preview-canvas"></canvas>

      </div>
    </div>

    <div class="file-list hidden" id="file-list"></div>

    <div class="hidden mt-16 flex gap-8 items-center flex-wrap" id="action-bar">
      <button class="btn btn-primary btn-lg" id="clean-btn">
        Удалить метаданные
      </button>
      <span class="text-muted text-sm" id="file-count"></span>
    </div>

    <div class="result-area" id="result-area">
      <hr class="divider">
      <div class="result-stats" id="result-stats"></div>
      <button class="btn btn-success hidden" id="download-all-btn">
        Скачать всё (ZIP)
      </button>
    </div>

  </div>
</main>

<script src="/js/core.js?v=5"></script>
<script>
(function () {
  const dropzoneEl  = document.getElementById('dropzone');
  const fileListEl  = document.getElementById('file-list');
  const settingsEl  = document.getElementById('settings-panel');
  const actionBarEl = document.getElementById('action-bar');
  const countEl     = document.getElementById('file-count');
  const cleanBtn    = document.getElementById('clean-btn');
  const clearBtn    = document.getElementById('clear-btn');
  const resultArea  = document.getElementById('result-area');
  const resultStats = document.getElementById('result-stats');
  const dlAllBtn    = document.getElementById('download-all-btn');

  const qualityInput = document.getElementById('quality');
  const qualityVal   = document.getElementById('quality-val');

  const previewBtn  = document.getElementById('preview-btn');
  const previewCanvas = document.getElementById('preview-canvas');

  const manager = new FileListManager(fileListEl);
  let files = [];
  let results = [];

  qualityInput.addEventListener('input', () => {
    qualityVal.textContent = qualityInput.value + '%';
  });

  fileListEl.addEventListener('file-removed', (e) => {
    files = files.filter(f => f.item.id !== e.detail.id);
    updateUI();
  });
  fileListEl.addEventListener('file-selected', () => {
    if (!previewCanvas.classList.contains('hidden')) previewBtn.click();
  });

  new Dropzone(dropzoneEl, {
    accept: ['image/jpeg','image/png','image/webp'],
    multiple: true,
    onFiles(newFiles) {
      newFiles.forEach(f => {
        files.push({ file: f, item: manager.add(f) });
      });
      updateUI();
    }
  });

  function updateUI() {
    const hasFiles = UIUtils.updateBatchLayout({ dropzoneEl, fileListEl, settingsEl, actionBarEl, countEl }, files.length);
    UIUtils.resetBatchResult({ resultArea, resultStats, downloadAllBtn: dlAllBtn });
    UIUtils.resetPreview({ previewBtn, previewCanvas }, hasFiles);
    results = [];
  }

  clearBtn.addEventListener('click', () => {
    files = [];
    manager.clear();
    updateUI();
  });

  previewBtn.addEventListener('click', async () => {
    if (!files.length) return;
    await UIUtils.runPreview(previewCanvas, async () => {
      const file = manager.getSelectedItem().file;
      const src = await FileUtils.readAsDataURL(file);
      const img = await FileUtils.loadImage(src);

      previewCanvas.width = img.naturalWidth;
      previewCanvas.height = img.naturalHeight;
      const pCtx = previewCanvas.getContext('2d');
      pCtx.drawImage(img, 0, 0);
      previewCanvas.classList.remove('hidden');
    });
  });

  cleanBtn.addEventListener('click', async () => {
    if (!files.length) return;
    cleanBtn.disabled = true;
    UIUtils.setBatchLocked(manager, [clearBtn, dlAllBtn, previewBtn], true);
    cleanBtn.innerHTML = '<span class="spinner"></span> Обработка...';
    results = [];
    let errors = 0;

    const q = parseInt(qualityInput.value) / 100;

    for (const entry of files) {
      const { file, item } = entry;
      manager.setStatus(item.id, 'Очистка...', 'status-processing');
      manager.setProgress(item.id, 20);

      try {
        const src = await FileUtils.readAsDataURL(file);
        manager.setProgress(item.id, 50);
        const img = await FileUtils.loadImage(src);
        
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        
        manager.setProgress(item.id, 70);
        
        const mime = file.type;
        // Canvas re-encoding drops embedded metadata.
        const blob = await FileUtils.canvasToBlob(canvas, mime, q);
        
        manager.setProgress(item.id, 100);
        const filename = file.name.replace(/\.[^.]+$/, '') + '_noexif.' + FileUtils.getExt(file.name);
        
        manager.setStatus(item.id, 'Очищено', 'status-done');
        manager.setMeta(item.id, `${FileUtils.formatSize(file.size)} → ${FileUtils.formatSize(blob.size)}`);
        manager.addDownload(item.id, blob, filename);

        results.push({ blob, filename });

      } catch (err) {
        errors++;
        manager.setStatus(item.id, 'Ошибка', 'status-error');
        console.error(err);
      }
    }

    if (results.length) {
      resultStats.innerHTML = `
        <div class="stat-card"><div class="stat-card__label">Очищено</div><div class="stat-card__value">${results.length}</div></div>
        <div class="stat-card stat-green"><div class="stat-card__label">Статус</div><div class="stat-card__value">Готово</div></div>
      `;
      UIUtils.showBatchResult({ resultArea, downloadAllBtn: dlAllBtn }, results.length);
      Toast.success('EXIF очищен.');
    }
    if (errors) {
      Toast.error('Не удалось очистить ' + FileUtils.formatFilesCount(errors) + '.');
    }

    cleanBtn.disabled = false;
    UIUtils.setBatchLocked(manager, [clearBtn, dlAllBtn, previewBtn], false);
    cleanBtn.innerHTML = 'Удалить метаданные';
  });

  dlAllBtn.addEventListener('click', async () => {
    await FileUtils.downloadZip(results, 'akd-noexif.zip');
  });

})();
</script>
</body>
</html>
