<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Сжать изображение – AKD Image</title>
  <meta name="description" content="Сжимайте JPG, PNG и WebP прямо в браузере. Изображения обрабатываются локально и не загружаются на сервер.">
  <link rel="canonical" href="https://akdimage.vercel.app/compress">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/main.css?v=5">
</head>
<body>

<script src="/js/layout.js?v=7"></script>

<main>
  <div class="container container--narrow tool-page">

    <div class="tool-page__header">
      <h1 class="tool-page__title">
        Сжать изображение
      </h1>
      <p class="tool-page__subtitle">Уменьшайте вес одного или нескольких изображений, выбирая подходящее качество и формат результата.</p>
    </div>
    <div class="dropzone" id="dropzone">
      <input type="file" accept="image/jpeg,image/png,image/webp" multiple>
      <p class="dropzone__title">Перетащите изображения сюда</p>
      <p class="dropzone__hint">или нажмите для выбора файлов</p>
      <div class="dropzone__formats">
        <span class="fmt-badge">JPG</span>
        <span class="fmt-badge">PNG</span>
        <span class="fmt-badge">WEBP</span>
      </div>
    </div>
    <div class="tool-panel hidden" id="settings-panel">
      <div class="tool-panel__head">
        <h3>Настройки сжатия</h3>
        <button class="btn btn-sm btn-secondary" id="clear-btn">Выбрать другой файл</button>
      </div>
      <div class="tool-panel__body">
        <div class="form-row">
          <div class="form-group">
            <label>Качество (JPG / WebP)</label>
            <div class="range-row">
              <input type="range" id="quality" min="10" max="100" value="82">
              <span id="quality-val">82%</span>
            </div>
          </div>
          <div class="form-group">
            <label>Формат вывода</label>
            <select id="output-format">
              <option value="same">Оставить оригинал</option>
              <option value="image/jpeg">JPG</option>
              <option value="image/png">PNG</option>
              <option value="image/webp">WebP</option>
            </select>
          </div>
        </div>

        <button class="btn btn-secondary mt-16 hidden" id="preview-btn">Предпросмотр выбранного изображения</button>
        <canvas class="preview-canvas hidden" id="preview-canvas"></canvas>

      </div>
    </div>
    <div class="file-list hidden" id="file-list"></div>
    <div class="hidden mt-16 flex gap-8 items-center" id="action-bar">
      <button class="btn btn-primary btn-lg" id="compress-btn">
        Сжать всё
      </button>
      <span class="text-muted text-sm" id="file-count"></span>
    </div>
    <div class="result-area" id="result-area">
      <hr class="divider">
      <div class="result-stats" id="result-stats"></div>
      <button class="btn btn-success hidden" id="download-all-btn">
        Скачать всё (ZIP)
      </button>
    </div>

  </div>
</main>

<script src="/js/core.js?v=5"></script>
<script>
(function () {
  const dropzoneEl   = document.getElementById('dropzone');
  const fileListEl   = document.getElementById('file-list');
  const settingsEl   = document.getElementById('settings-panel');
  const actionBarEl  = document.getElementById('action-bar');
  const countEl      = document.getElementById('file-count');
  const compressBtn  = document.getElementById('compress-btn');
  const clearBtn     = document.getElementById('clear-btn');
  const resultArea   = document.getElementById('result-area');
  const resultStats  = document.getElementById('result-stats');
  const dlAllBtn     = document.getElementById('download-all-btn');
  const previewBtn   = document.getElementById('preview-btn');
  const previewCanvas = document.getElementById('preview-canvas');
  const qualityInput = document.getElementById('quality');
  const qualityVal   = document.getElementById('quality-val');
  const outputFmt    = document.getElementById('output-format');

  const manager = new FileListManager(fileListEl);
  let files = [];
  let results = [];

  fileListEl.addEventListener('file-removed', (e) => {
    files = files.filter(f => f.item.id !== e.detail.id);
    updateUI();
  });
  fileListEl.addEventListener('file-selected', () => {
    if (!previewCanvas.classList.contains('hidden')) previewBtn.click();
  });

  qualityInput.addEventListener('input', () => {
    qualityVal.textContent = qualityInput.value + '%';
  });

  new Dropzone(dropzoneEl, {
    accept: ['image/jpeg','image/png','image/webp'],
    multiple: true,
    onFiles(newFiles) {
      newFiles.forEach(f => {
        files.push({ file: f, item: manager.add(f) });
      });
      updateUI();
    }
  });

  function updateUI() {
    const hasFiles = UIUtils.updateBatchLayout({ dropzoneEl, fileListEl, settingsEl, actionBarEl, countEl }, files.length);
    UIUtils.resetBatchResult({ resultArea, resultStats, downloadAllBtn: dlAllBtn });
    UIUtils.resetPreview({ previewBtn, previewCanvas }, hasFiles);
    results = [];
  }

  previewBtn.addEventListener('click', async () => {
    if (!files.length) return;
    await UIUtils.runPreview(previewCanvas, async () => {
      const file = manager.getSelectedItem().file;
      const src = await FileUtils.readAsDataURL(file);
      const img = await FileUtils.loadImage(src);
      previewCanvas.width = img.naturalWidth;
      previewCanvas.height = img.naturalHeight;
      previewCanvas.getContext('2d').drawImage(img, 0, 0);
      previewCanvas.classList.remove('hidden');
    });
  });

  function plural(n, a, b, c) {
    const m = n % 10;
    if (n % 100 >= 11 && n % 100 <= 19) return c;
    if (m === 1) return a;
    if (m >= 2 && m <= 4) return b;
    return c;
  }

  clearBtn.addEventListener('click', () => {
    files = [];
    manager.clear();
    updateUI();
  });

  compressBtn.addEventListener('click', async () => {
    if (!files.length) return;
    compressBtn.disabled = true;
    UIUtils.setBatchLocked(manager, [clearBtn, dlAllBtn, previewBtn], true);
    compressBtn.innerHTML = '<span class="spinner"></span> Сжимаю...';
    results = [];
    let errors = 0;
    let totalBefore = 0, totalAfter = 0;

    for (const entry of files) {
      const { file, item } = entry;
      manager.setStatus(item.id, 'Обработка...', 'status-processing');
      manager.setProgress(item.id, 10);

      try {
        let blob;
        const mime  = outputFmt.value === 'same' ? file.type : outputFmt.value;
        const q     = parseInt(qualityInput.value) / 100;

        const dataURL = await FileUtils.readAsDataURL(file);
        manager.setProgress(item.id, 40);
        const img    = await FileUtils.loadImage(dataURL);
        const canvas = document.createElement('canvas');
        canvas.width  = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx    = canvas.getContext('2d');
        if (mime === 'image/jpeg') {
          ctx.fillStyle = '#fff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        ctx.drawImage(img, 0, 0);
        manager.setProgress(item.id, 70);
        blob = await FileUtils.canvasToBlob(canvas, mime, q);

        manager.setProgress(item.id, 100);
        const ext      = mime.split('/')[1].replace('jpeg','jpg');
        const filename = file.name.replace(/\.[^.]+$/, '') + '_akd.' + ext;
        const saving   = file.size - blob.size;
        const pct      = file.size > 0 ? ((saving / file.size) * 100).toFixed(1) : '0';

        manager.setStatus(item.id, `−${pct}%`, 'status-done');
        manager.setMeta(item.id,
          FileUtils.formatSize(file.size) + '  ' + FileUtils.formatSize(blob.size));
        manager.addDownload(item.id, blob, filename);

        results.push({ blob, filename });
        totalBefore += file.size;
        totalAfter  += blob.size;

      } catch (err) {
        errors++;
        manager.setStatus(item.id, 'Ошибка', 'status-error');
        console.error(err);
      }
    }

    if (results.length) {
      const saved = totalBefore - totalAfter;
      const pct   = totalBefore > 0 ? ((saved / totalBefore) * 100).toFixed(1) : '0';
      resultStats.innerHTML = `
        <div class="stat-card"><div class="stat-card__label">До</div><div class="stat-card__value">${FileUtils.formatSize(totalBefore)}</div></div>
        <div class="stat-card"><div class="stat-card__label">После</div><div class="stat-card__value">${FileUtils.formatSize(totalAfter)}</div></div>
        <div class="stat-card stat-green"><div class="stat-card__label">Сэкономлено</div><div class="stat-card__value">−${pct}%</div></div>
      `;
      UIUtils.showBatchResult({ resultArea, downloadAllBtn: dlAllBtn }, results.length);
      Toast.success('Сжатие завершено.');
    }
    if (errors) {
      Toast.error('Не удалось обработать ' + FileUtils.formatFilesCount(errors) + '.');
    }

    compressBtn.disabled = false;
    UIUtils.setBatchLocked(manager, [clearBtn, dlAllBtn, previewBtn], false);
    compressBtn.innerHTML = 'Сжать всё';
  });

  dlAllBtn.addEventListener('click', async () => {
    await FileUtils.downloadZip(results, 'akd-compressed.zip');
  });

})();
</script>
</body>
</html>
