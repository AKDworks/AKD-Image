<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Повернуть и отразить — AKD Image</title>
  <meta name="description" content="Поворачивайте и отражайте JPG, PNG и WebP в браузере. Выберите угол, примените отражение и скачайте результат.">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>

<script src="../js/layout.js?v=6"></script>

<main>
  <div class="container container--narrow tool-page">

    <div class="tool-page__header">
      <h1 class="tool-page__title">
        Повернуть / Отразить
      </h1>
      <p class="tool-page__subtitle">Поворачивайте изображения на 90°, 180°, 270° или отражайте по горизонтали и вертикали.</p>
    </div>
    <div class="dropzone" id="dropzone">
      <input type="file" accept="image/jpeg,image/png,image/webp" multiple>
      <p class="dropzone__title">Перетащите изображения сюда</p>
      <p class="dropzone__hint">или нажмите для выбора файлов</p>
      <div class="dropzone__formats">
        <span class="fmt-badge">JPG</span>
        <span class="fmt-badge">PNG</span>
        <span class="fmt-badge">WEBP</span>
      </div>
    </div>
    <div class="tool-panel hidden" id="settings-panel">
      <div class="tool-panel__head">
        <h3>Действия</h3>
        <button class="btn btn-sm btn-secondary" id="clear-btn">Очистить всё</button>
      </div>
      <div class="tool-panel__body">
        <div class="flex gap-8 flex-wrap">
          <button class="btn btn-secondary" id="rot-90">90°</button>
          <button class="btn btn-secondary" id="rot-180">180°</button>
          <button class="btn btn-secondary" id="rot-270">270°</button>
          <button class="btn btn-secondary" id="flip-h">↔ Отразить по горизонтали</button>
          <button class="btn btn-secondary" id="flip-v">↕ Отразить по вертикали</button>
        </div>

        <button class="btn btn-secondary mt-16 hidden" id="preview-btn">Предпросмотр (первое изображение)</button>
        <canvas class="preview-canvas hidden" id="preview-canvas"></canvas>

      </div>
    </div>
    <div class="file-list hidden" id="file-list"></div>
    <div class="hidden mt-16 flex gap-8 items-center" id="action-bar">
      <button class="btn btn-primary btn-lg" id="apply-btn">Применить и скачать</button>
      <span class="text-muted text-sm" id="file-count"></span>
    </div>
    <div class="result-area" id="result-area">
      <hr class="divider">
      <div class="result-stats" id="result-stats"></div>
      <button class="btn btn-success hidden" id="download-all-btn">Скачать всё (ZIP)</button>
    </div>

  </div>
</main>

<script src="../js/core.js"></script>
<script>
(function () {
  const dropzoneEl  = document.getElementById('dropzone');
  const fileListEl  = document.getElementById('file-list');
  const settingsEl  = document.getElementById('settings-panel');
  const actionBarEl = document.getElementById('action-bar');
  const countEl     = document.getElementById('file-count');
  const applyBtn    = document.getElementById('apply-btn');
  const clearBtn    = document.getElementById('clear-btn');
  const resultArea  = document.getElementById('result-area');
  const resultStats = document.getElementById('result-stats');
  const dlAllBtn    = document.getElementById('download-all-btn');
  const previewBtn  = document.getElementById('preview-btn');

  let rotation = 0;
  let flipH = false;
  let flipV = false;

  const rot90Btn = document.getElementById('rot-90');
  const rot180Btn = document.getElementById('rot-180');
  const rot270Btn = document.getElementById('rot-270');
  const flipHBtn = document.getElementById('flip-h');
  const flipVBtn = document.getElementById('flip-v');

  rot90Btn.onclick  = () => { rotation = rotation === 90 ? 0 : 90; updateStatusLabel(); };
  rot180Btn.onclick = () => { rotation = rotation === 180 ? 0 : 180; updateStatusLabel(); };
  rot270Btn.onclick = () => { rotation = rotation === 270 ? 0 : 270; updateStatusLabel(); };
  flipHBtn.onclick  = () => { flipH = !flipH; updateStatusLabel(); };
  flipVBtn.onclick  = () => { flipV = !flipV; updateStatusLabel(); };

  function updateStatusLabel() {
    let statusParts = [];
    if (rotation > 0) statusParts.push(`поворот ${rotation}°`);
    if (flipH) statusParts.push('отражение Г');
    if (flipV) statusParts.push('отражение В');
    const desc = statusParts.join(', ') || 'нет изменений';
    updateActionButtons();
    Toast.info('Выбрано: ' + desc);
  }

  function updateActionButtons() {
    rot90Btn.classList.toggle('is-active', rotation === 90);
    rot180Btn.classList.toggle('is-active', rotation === 180);
    rot270Btn.classList.toggle('is-active', rotation === 270);
    flipHBtn.classList.toggle('is-active', flipH);
    flipVBtn.classList.toggle('is-active', flipV);
  }

  const manager = new FileListManager(fileListEl);
  let files = [], results = [];

  fileListEl.addEventListener('file-removed', (e) => {
    files = files.filter(f => f.item.id !== e.detail.id);
    updateUI();
  });

  new Dropzone(dropzoneEl, {
    accept: ['image/jpeg','image/png','image/webp'],
    multiple: true,
    onFiles(newFiles) {
      newFiles.forEach(f => files.push({ file: f, item: manager.add(f) }));
      updateUI();
    }
  });

  function updateUI() {
    const has = files.length > 0;
    fileListEl.classList.toggle('hidden', !has);
    settingsEl.classList.toggle('hidden', !has);
    actionBarEl.classList.toggle('hidden', !has);
    countEl.textContent = FileUtils.formatFilesCount(files.length);
    resultArea.classList.remove('visible');
    results = []; dlAllBtn.classList.add('hidden'); resultStats.innerHTML = '';
    const previewBtn = document.getElementById('preview-btn');
    if (previewBtn) previewBtn.classList.toggle('hidden', !(has));
    const canvas = document.getElementById('preview-canvas');
    if (canvas) canvas.classList.add('hidden');
  }

  document.getElementById('preview-btn').addEventListener('click', async () => {
    if (!files.length) return;
    const file = files[0].file;
    const src = await FileUtils.readAsDataURL(file);
    const img = await FileUtils.loadImage(src);
    
    const canvas = document.getElementById('preview-canvas');
    const ctx = canvas.getContext('2d');
    
    const isSwapped = rotation === 90 || rotation === 270;
    const w = isSwapped ? img.naturalHeight : img.naturalWidth;
    const h = isSwapped ? img.naturalWidth : img.naturalHeight;
    
    canvas.width = w;
    canvas.height = h;
    
    ctx.translate(w / 2, h / 2);
    ctx.rotate((rotation * Math.PI) / 180);
    const scaleX = flipH ? -1 : 1;
    const scaleY = flipV ? -1 : 1;
    ctx.scale(scaleX, scaleY);
    ctx.drawImage(img, -img.naturalWidth / 2, -img.naturalHeight / 2);
    
    canvas.classList.remove('hidden');
  });

  clearBtn.addEventListener('click', () => {
    files = []; manager.clear(); updateUI();
    rotation = 0; flipH = false; flipV = false;
    updateActionButtons();
  });

  applyBtn.addEventListener('click', async () => {
    if (!files.length) return;
    applyBtn.disabled = true;
    UIUtils.setBatchLocked(manager, [clearBtn, dlAllBtn, previewBtn], true);
    applyBtn.innerHTML = '<span class="spinner"></span> Обработка...';
    results = [];
    let errors = 0;

    for (const entry of files) {
      const { file, item } = entry;
      manager.setStatus(item.id, 'Обработка...', 'status-processing');
      manager.setProgress(item.id, 20);

      try {
        const dataURL = await FileUtils.readAsDataURL(file);
        manager.setProgress(item.id, 50);
        const img = await FileUtils.loadImage(dataURL);
        
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        const isSwapped = rotation === 90 || rotation === 270;
        const w = isSwapped ? img.naturalHeight : img.naturalWidth;
        const h = isSwapped ? img.naturalWidth : img.naturalHeight;
        
        canvas.width = w;
        canvas.height = h;
        
        ctx.translate(w / 2, h / 2);
        ctx.rotate((rotation * Math.PI) / 180);
        
        const scaleX = flipH ? -1 : 1;
        const scaleY = flipV ? -1 : 1;
        ctx.scale(scaleX, scaleY);
        
        ctx.drawImage(img, -img.naturalWidth / 2, -img.naturalHeight / 2);
        
        manager.setProgress(item.id, 80);
        
        const blob = await FileUtils.canvasToBlob(canvas, file.type, 0.95);
        const newFilename = file.name.replace(/\.[^.]+$/, '') + '_rotated.' + FileUtils.getExt(file.name);
        
        manager.setProgress(item.id, 100);
        manager.setStatus(item.id, 'Готово', 'status-done');
        manager.setMeta(item.id, `${w}×${h} · ${FileUtils.formatSize(blob.size)}`);
        manager.addDownload(item.id, blob, newFilename);
        results.push({ blob, filename: newFilename });
      } catch (err) {
        errors++;
        manager.setStatus(item.id, 'Ошибка', 'status-error');
        console.error(err);
      }
    }

    if (results.length) {
      resultStats.innerHTML = `
        <div class="stat-card"><div class="stat-card__label">Обработано</div><div class="stat-card__value">${results.length}</div></div>
        <div class="stat-card stat-green"><div class="stat-card__label">Статус</div><div class="stat-card__value">Готово</div></div>
      `;
      resultArea.classList.add('visible');
      dlAllBtn.classList.toggle('hidden', results.length <= 1);
      Toast.success('Поворот завершён.');
    }
    if (errors) {
      Toast.error('Не удалось обработать ' + FileUtils.formatFilesCount(errors) + '.');
    }

    applyBtn.disabled = false;
    UIUtils.setBatchLocked(manager, [clearBtn, dlAllBtn, previewBtn], false);
    applyBtn.innerHTML = 'Применить и скачать';
  });

  dlAllBtn.addEventListener('click', async () => {
    await FileUtils.downloadZip(results, 'akd-rotated.zip');
  });

})();
</script>
</body>
</html>
