<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Пикселизатор — AKD Image</title>
  <meta name="description" content="Пикселизируйте JPG, PNG и WebP в стиле pixel art с настраиваемым размером пикселя.">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>

<script src="../js/layout.js?v=7"></script>

<main>
  <div class="container container--narrow tool-page">

    <div class="tool-page__header">
      <h1 class="tool-page__title">Пикселизатор</h1>
      <p class="tool-page__subtitle">Стилизуйте JPG, PNG или WebP под пиксель-арт с настраиваемым размером пикселя.</p>
    </div>
    <div class="dropzone" id="dropzone">
      <input type="file" accept="image/jpeg,image/png,image/webp" multiple>
      <p class="dropzone__title">Перетащите изображения сюда</p>
      <p class="dropzone__hint">или нажмите для выбора файлов</p>
      <div class="dropzone__formats">
        <span class="fmt-badge">JPG</span>
        <span class="fmt-badge">PNG</span>
        <span class="fmt-badge">WEBP</span>
      </div>
    </div>
    <div class="tool-panel hidden" id="settings-panel">
      <div class="tool-panel__head">
        <h3>Настройки</h3>
        <button class="btn btn-sm btn-secondary" id="clear-btn">Выбрать другой файл</button>
      </div>
      <div class="tool-panel__body">
        
        <div class="form-group">
          <label>Размер пикселя</label>
          <div class="range-row">
            <input type="range" id="pixel-size" min="2" max="50" value="10">
            <span id="pixel-val">10</span>
          </div>
        </div>

        <button class="btn btn-secondary mt-16 hidden" id="preview-btn">Предпросмотр (первое изображение)</button>
        <canvas class="preview-canvas preview-canvas--pixelated hidden" id="preview-canvas"></canvas>

      </div>
    </div>
    <div class="file-list hidden" id="file-list"></div>
    <div class="hidden mt-16 flex gap-8 items-center flex-wrap" id="action-bar">
      <button class="btn btn-primary btn-lg" id="pixelate-btn">
        Пикселизировать
      </button>
      <span class="text-muted text-sm" id="file-count"></span>
    </div>
    <div class="result-area" id="result-area">
      <hr class="divider">
      <div class="result-stats" id="result-stats"></div>
      <button class="btn btn-success hidden" id="download-all-btn">
        Скачать всё (ZIP)
      </button>
    </div>

  </div>
</main>

<script src="../js/core.js?v=2"></script>
<script>
(function () {
  const dropzoneEl  = document.getElementById('dropzone');
  const fileListEl  = document.getElementById('file-list');
  const settingsEl  = document.getElementById('settings-panel');
  const actionBarEl = document.getElementById('action-bar');
  const countEl     = document.getElementById('file-count');
  const pixelateBtn = document.getElementById('pixelate-btn');
  const clearBtn    = document.getElementById('clear-btn');
  const resultArea  = document.getElementById('result-area');
  const resultStats = document.getElementById('result-stats');
  const dlAllBtn    = document.getElementById('download-all-btn');

  const pixelSizeInput = document.getElementById('pixel-size');
  const pixelVal       = document.getElementById('pixel-val');

  const previewBtn  = document.getElementById('preview-btn');
  const previewCanvas = document.getElementById('preview-canvas');

  const manager = new FileListManager(fileListEl);
  let files = [];
  let results = [];

  pixelSizeInput.addEventListener('input', () => {
    pixelVal.textContent = pixelSizeInput.value;
  });

  fileListEl.addEventListener('file-removed', (e) => {
    files = files.filter(f => f.item.id !== e.detail.id);
    updateUI();
  });

  new Dropzone(dropzoneEl, {
    accept: ['image/jpeg','image/png','image/webp'],
    multiple: true,
    onFiles(newFiles) {
      newFiles.forEach(f => {
        files.push({ file: f, item: manager.add(f) });
      });
      updateUI();
    }
  });

  function updateUI() {
    const hasFiles = UIUtils.updateBatchLayout({ fileListEl, settingsEl, actionBarEl, countEl }, files.length);
    UIUtils.resetBatchResult({ resultArea, resultStats, downloadAllBtn: dlAllBtn });
    UIUtils.resetPreview({ previewBtn, previewCanvas }, hasFiles);
    results = [];
  }

  clearBtn.addEventListener('click', () => {
    files = [];
    manager.clear();
    updateUI();
  });

  function applyPixelation(img, pSize) {
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    
    ctx.imageSmoothingEnabled = false;

    // Downscale, then upscale without smoothing for a pixelated look.
    const w = Math.max(1, Math.floor(canvas.width / pSize));
    const h = Math.max(1, Math.floor(canvas.height / pSize));

    const offCanvas = document.createElement('canvas');
    offCanvas.width = w;
    offCanvas.height = h;
    const offCtx = offCanvas.getContext('2d');
    offCtx.drawImage(img, 0, 0, w, h);

    ctx.drawImage(offCanvas, 0, 0, w, h, 0, 0, canvas.width, canvas.height);
    return canvas;
  }

  previewBtn.addEventListener('click', async () => {
    if (!files.length) return;
    await UIUtils.runPreview(previewCanvas, async () => {
      const file = files[0].file;
      const src = await FileUtils.readAsDataURL(file);
      const img = await FileUtils.loadImage(src);

      const pSize = parseInt(pixelSizeInput.value) || 10;
      const processedCanvas = applyPixelation(img, pSize);

      previewCanvas.width = processedCanvas.width;
      previewCanvas.height = processedCanvas.height;
      const pCtx = previewCanvas.getContext('2d');
      pCtx.drawImage(processedCanvas, 0, 0);
      previewCanvas.classList.remove('hidden');
    });
  });

  pixelateBtn.addEventListener('click', async () => {
    if (!files.length) return;
    pixelateBtn.disabled = true;
    UIUtils.setBatchLocked(manager, [clearBtn, dlAllBtn, previewBtn], true);
    pixelateBtn.innerHTML = '<span class="spinner"></span> Обработка...';
    results = [];
    let errors = 0;

    const pSize = parseInt(pixelSizeInput.value) || 10;

    for (const entry of files) {
      const { file, item } = entry;
      manager.setStatus(item.id, 'Обработка...', 'status-processing');
      manager.setProgress(item.id, 20);

      try {
        const src = await FileUtils.readAsDataURL(file);
        manager.setProgress(item.id, 50);
        const img = await FileUtils.loadImage(src);
        
        const canvas = applyPixelation(img, pSize);
        manager.setProgress(item.id, 70);
        
        const mime = file.type;
        const blob = await FileUtils.canvasToBlob(canvas, mime, 0.95);
        
        manager.setProgress(item.id, 100);
        const filename = file.name.replace(/\.[^.]+$/, '') + '_pixel.' + FileUtils.getExt(file.name);
        
        manager.setStatus(item.id, 'Готово', 'status-done');
        manager.setMeta(item.id, `${canvas.width}×${canvas.height} · ${FileUtils.formatSize(blob.size)}`);
        manager.addDownload(item.id, blob, filename);

        results.push({ blob, filename });

      } catch (err) {
        errors++;
        manager.setStatus(item.id, 'Ошибка', 'status-error');
        console.error(err);
      }
    }

    if (results.length) {
      resultStats.innerHTML = `
        <div class="stat-card"><div class="stat-card__label">Обработано</div><div class="stat-card__value">${results.length}</div></div>
        <div class="stat-card stat-green"><div class="stat-card__label">Статус</div><div class="stat-card__value">Готово</div></div>
      `;
      UIUtils.showBatchResult({ resultArea, downloadAllBtn: dlAllBtn }, results.length);
      Toast.success('Пикселизация завершена.');
    }
    if (errors) {
      Toast.error('Не удалось обработать ' + FileUtils.formatFilesCount(errors) + '.');
    }

    pixelateBtn.disabled = false;
    UIUtils.setBatchLocked(manager, [clearBtn, dlAllBtn, previewBtn], false);
    pixelateBtn.innerHTML = 'Пикселизировать';
  });

  dlAllBtn.addEventListener('click', async () => {
    await FileUtils.downloadZip(results, 'akd-pixelated.zip');
  });

})();
</script>
</body>
</html>
