<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Скругление углов — AKD Image</title>
  <meta name="description" content="Скругляйте углы JPG, PNG и WebP и сохраняйте результат как PNG с прозрачными краями.">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>

<script src="../js/layout.js?v=6"></script>

<main>
  <div class="container container--narrow tool-page">

    <div class="tool-page__header">
      <h1 class="tool-page__title">Скругление углов</h1>
      <p class="tool-page__subtitle">Сделайте углы изображений плавно закругленными. На выходе — прозрачный PNG.</p>
    </div>
    <div class="dropzone" id="dropzone">
      <input type="file" accept="image/jpeg,image/png,image/webp" multiple>
      <p class="dropzone__title">Перетащите изображения сюда</p>
      <p class="dropzone__hint">или нажмите для выбора файлов</p>
      <div class="dropzone__formats">
        <span class="fmt-badge">JPG</span>
        <span class="fmt-badge">PNG</span>
        <span class="fmt-badge">WEBP</span>
      </div>
    </div>
    <div class="tool-panel hidden" id="settings-panel">
      <div class="tool-panel__head">
        <h3>Настройки</h3>
        <button class="btn btn-sm btn-secondary" id="clear-btn">Очистить всё</button>
      </div>
      <div class="tool-panel__body">
        
        <div class="form-group">
          <label>Радиус скругления (%) <span style="font-weight: normal; color: var(--muted); font-size: 0.85rem;">от наименьшей стороны</span></label>
          <div class="range-row">
            <input type="range" id="radius-val" min="0" max="50" value="15">
            <span id="radius-lbl">15%</span>
          </div>
        </div>

        <button class="btn btn-secondary mt-16" id="preview-btn" style="display:none;">Предпросмотр (первое изображение)</button>
        <canvas id="preview-canvas" style="display:none; max-width:100%; border:1px solid var(--border); border-radius:var(--r-md); margin-top:16px; background: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAMUlEQVQ4T2NkYNgGw31sE/4zyGAeQNyEYwM8sQy2CXA1yP4wGIA+E2FzEowB1k2EDQBMt+U4Vv/yJgAAAABJRU5ErkJggg==') repeat;"></canvas>

      </div>
    </div>
    <div class="file-list hidden" id="file-list"></div>
    <div class="hidden mt-16 flex gap-8 items-center flex-wrap" id="action-bar">
      <button class="btn btn-primary btn-lg" id="round-btn">
        Скруглить углы
      </button>
      <span class="text-muted text-sm" id="file-count"></span>
    </div>
    <div class="result-area" id="result-area">
      <hr class="divider">
      <div class="result-stats" id="result-stats"></div>
      <button class="btn btn-success" id="download-all-btn" style="display:none;">
        Скачать всё (ZIP)
      </button>
    </div>

  </div>
</main>

<script src="../js/core.js"></script>
<script>
(function () {
  const dropzoneEl  = document.getElementById('dropzone');
  const fileListEl  = document.getElementById('file-list');
  const settingsEl  = document.getElementById('settings-panel');
  const actionBarEl = document.getElementById('action-bar');
  const countEl     = document.getElementById('file-count');
  const roundBtn    = document.getElementById('round-btn');
  const clearBtn    = document.getElementById('clear-btn');
  const resultArea  = document.getElementById('result-area');
  const resultStats = document.getElementById('result-stats');
  const dlAllBtn    = document.getElementById('download-all-btn');

  const radiusInput = document.getElementById('radius-val');
  const radiusLbl   = document.getElementById('radius-lbl');

  const previewBtn  = document.getElementById('preview-btn');
  const previewCanvas = document.getElementById('preview-canvas');

  const manager = new FileListManager(fileListEl);

  let files = [];
  let results = [];

  radiusInput.addEventListener('input', () => {
    radiusLbl.textContent = radiusInput.value + '%';
  });

  fileListEl.addEventListener('file-removed', (e) => {
    files = files.filter(f => f.item.id !== e.detail.id);
    updateUI();
  });

  new Dropzone(dropzoneEl, {
    accept: ['image/jpeg','image/png','image/webp'],
    multiple: true,
    onFiles(newFiles) {
      newFiles.forEach(f => {
        files.push({ file: f, item: manager.add(f) });
      });
      updateUI();
    }
  });

  function updateUI() {
    const hasFiles = files.length > 0;
    fileListEl.classList.toggle('hidden', !hasFiles);
    settingsEl.classList.toggle('hidden', !hasFiles);
    actionBarEl.classList.toggle('hidden', !hasFiles);
    countEl.textContent = FileUtils.formatFilesCount(files.length);
    resultArea.classList.remove('visible');
    results = [];
    previewBtn.style.display = hasFiles ? '' : 'none';
    previewCanvas.style.display = 'none';
    dlAllBtn.style.display = 'none';
  }

  clearBtn.addEventListener('click', () => {
    files = [];
    manager.clear();
    updateUI();
  });

  function applyRounding(img, radiusPercent) {
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');
    
    const minSide = Math.min(canvas.width, canvas.height);
    const r = (radiusPercent / 100) * minSide;
    
    ctx.beginPath();
    if (ctx.roundRect) {
      ctx.roundRect(0, 0, canvas.width, canvas.height, r);
    } else {
      ctx.moveTo(r, 0);
      ctx.lineTo(canvas.width - r, 0);
      ctx.quadraticCurveTo(canvas.width, 0, canvas.width, r);
      ctx.lineTo(canvas.width, canvas.height - r);
      ctx.quadraticCurveTo(canvas.width, canvas.height, canvas.width - r, canvas.height);
      ctx.lineTo(r, canvas.height);
      ctx.quadraticCurveTo(0, canvas.height, 0, canvas.height - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
    }
    ctx.clip();
    
    ctx.drawImage(img, 0, 0);
    return canvas;
  }

  previewBtn.addEventListener('click', async () => {
    if (!files.length) return;
    const file = files[0].file;
    const src = await FileUtils.readAsDataURL(file);
    const img = await FileUtils.loadImage(src);
    
    const percent = parseInt(radiusInput.value) || 0;
    const processedCanvas = applyRounding(img, percent);
    
    previewCanvas.width = processedCanvas.width;
    previewCanvas.height = processedCanvas.height;
    const pCtx = previewCanvas.getContext('2d');
    pCtx.clearRect(0, 0, previewCanvas.width, previewCanvas.height);
    pCtx.drawImage(processedCanvas, 0, 0);
    previewCanvas.style.display = 'block';
  });

  roundBtn.addEventListener('click', async () => {
    if (!files.length) return;
    roundBtn.disabled = true;
    roundBtn.innerHTML = '<span class="spinner"></span> Обработка...';
    results = [];

    const percent = parseInt(radiusInput.value) || 0;

    for (const entry of files) {
      const { file, item } = entry;
      manager.setStatus(item.id, 'Обработка...', 'status-processing');
      manager.setProgress(item.id, 20);

      try {
        const src = await FileUtils.readAsDataURL(file);
        manager.setProgress(item.id, 50);
        const img = await FileUtils.loadImage(src);
        
        const canvas = applyRounding(img, percent);
        manager.setProgress(item.id, 70);
        
        const blob = await FileUtils.canvasToBlob(canvas, 'image/png', 1.0);
        
        manager.setProgress(item.id, 100);
        const filename = file.name.replace(/\.[^.]+$/, '') + '_rounded.png';
        
        manager.setStatus(item.id, 'Готово', 'status-done');
        manager.setMeta(item.id, `${canvas.width}×${canvas.height} · ${FileUtils.formatSize(blob.size)} · PNG`);
        manager.addDownload(item.id, blob, filename);

        results.push({ blob, filename });

      } catch (err) {
        manager.setStatus(item.id, 'Ошибка', 'status-error');
        console.error(err);
      }
    }

    if (results.length) {
      resultStats.innerHTML = `
        <div class="stat-card"><div class="stat-card__label">Обработано</div><div class="stat-card__value">${results.length}</div></div>
        <div class="stat-card stat-green"><div class="stat-card__label">Статус</div><div class="stat-card__value"> Успешно</div></div>
      `;
      resultArea.classList.add('visible');
      if (results.length > 1) dlAllBtn.style.display = '';
    }

    roundBtn.disabled = false;
    roundBtn.innerHTML = 'Скруглить углы';
  });

  dlAllBtn.addEventListener('click', async () => {
    await FileUtils.downloadZip(results, 'akd-rounded.zip');
  });

})();
</script>
</body>
</html>
