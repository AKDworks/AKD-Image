<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Конвертировать изображение — AKD Image</title>
  <meta name="description" content="Конвертируйте изображения между JPG, PNG и WebP локально в браузере без отправки файлов на сервер.">
  <link rel="stylesheet" href="../css/main.css">
</head>
<body>

<script src="../js/layout.js?v=6"></script>

<main>
  <div class="container container--narrow tool-page">

    <div class="tool-page__header">
      <h1 class="tool-page__title">
        Конвертировать изображение
      </h1>
      <p class="tool-page__subtitle">Конвертируйте изображения между форматами JPG, PNG и WebP.</p>
    </div>
    <div class="dropzone" id="dropzone">
      <input type="file" accept="image/jpeg,image/png,image/webp" multiple>
      <p class="dropzone__title">Перетащите изображения сюда</p>
      <p class="dropzone__hint">или нажмите для выбора файлов</p>
      <div class="dropzone__formats">
        <span class="fmt-badge">JPG</span>
        <span class="fmt-badge">PNG</span>
        <span class="fmt-badge">WEBP</span>
      </div>
    </div>
    <div class="tool-panel hidden" id="settings-panel">
      <div class="tool-panel__head">
        <h3>Параметры конвертации</h3>
        <button class="btn btn-sm btn-secondary" id="clear-btn">Очистить всё</button>
      </div>
      <div class="tool-panel__body">
        <div class="form-row">
          <div class="form-group">
            <label>Целевой формат</label>
            <select id="target-format">
              <option value="image/jpeg">JPG</option>
              <option value="image/png">PNG</option>
              <option value="image/webp">WebP</option>
            </select>
          </div>
          <div class="form-group">
            <label>Качество (JPG / WebP)</label>
            <div class="range-row">
              <input type="range" id="quality" min="10" max="100" value="90">
              <span id="quality-val">90%</span>
            </div>
          </div>
        </div>

        <button class="btn btn-secondary mt-16 hidden" id="preview-btn">Предпросмотр (первое изображение)</button>
        <canvas class="preview-canvas hidden" id="preview-canvas"></canvas>

      </div>
    </div>
    <div class="file-list hidden" id="file-list"></div>
    <div class="hidden mt-16 flex gap-8 items-center" id="action-bar">
      <button class="btn btn-primary btn-lg" id="convert-btn">Конвертировать всё</button>
      <span class="text-muted text-sm" id="file-count"></span>
    </div>
    <div class="result-area" id="result-area">
      <hr class="divider">
      <div class="result-stats" id="result-stats"></div>
      <button class="btn btn-success hidden" id="download-all-btn">Скачать всё (ZIP)</button>
    </div>

  </div>
</main>

<script src="../js/core.js"></script>
<script>
(function () {
  const dropzoneEl  = document.getElementById('dropzone');
  const fileListEl  = document.getElementById('file-list');
  const settingsEl  = document.getElementById('settings-panel');
  const actionBarEl = document.getElementById('action-bar');
  const countEl     = document.getElementById('file-count');
  const convertBtn  = document.getElementById('convert-btn');
  const clearBtn    = document.getElementById('clear-btn');
  const resultArea  = document.getElementById('result-area');
  const resultStats = document.getElementById('result-stats');
  const dlAllBtn    = document.getElementById('download-all-btn');
  const previewBtn  = document.getElementById('preview-btn');
  const previewCanvas = document.getElementById('preview-canvas');
  const targetFormat= document.getElementById('target-format');
  const qualityInput = document.getElementById('quality');
  const qualityVal   = document.getElementById('quality-val');

  qualityInput.addEventListener('input', () => { qualityVal.textContent = qualityInput.value + '%'; });

  const manager = new FileListManager(fileListEl);
  let files = [], results = [];

  fileListEl.addEventListener('file-removed', (e) => {
    files = files.filter(f => f.item.id !== e.detail.id);
    updateUI();
  });

  new Dropzone(dropzoneEl, {
    accept: ['image/jpeg','image/png','image/webp'],
    multiple: true,
    onFiles(newFiles) {
      newFiles.forEach(f => files.push({ file: f, item: manager.add(f) }));
      updateUI();
    }
  });

  function updateUI() {
    const has = UIUtils.updateBatchLayout({ fileListEl, settingsEl, actionBarEl, countEl }, files.length);
    UIUtils.resetBatchResult({ resultArea, resultStats, downloadAllBtn: dlAllBtn });
    UIUtils.resetPreview({ previewBtn, previewCanvas }, has);
    results = [];
  }

  previewBtn.addEventListener('click', async () => {
    if (!files.length) return;
    const file = files[0].file;
    const src = await FileUtils.readAsDataURL(file);
    const img = await FileUtils.loadImage(src);
    previewCanvas.width = img.naturalWidth;
    previewCanvas.height = img.naturalHeight;
    previewCanvas.getContext('2d').drawImage(img, 0, 0);
    previewCanvas.classList.remove('hidden');
  });

  clearBtn.addEventListener('click', () => { files = []; manager.clear(); updateUI(); });

  convertBtn.addEventListener('click', async () => {
    if (!files.length) return;
    convertBtn.disabled = true;
    UIUtils.setBatchLocked(manager, [clearBtn, dlAllBtn, previewBtn], true);
    convertBtn.innerHTML = '<span class="spinner"></span> Конвертирую...';
    results = [];
    let errors = 0;

    const mime = targetFormat.value;
    const q = parseInt(qualityInput.value) / 100;
    const ext = mime.split('/')[1].replace('jpeg','jpg');

    for (const entry of files) {
      const { file, item } = entry;
      manager.setStatus(item.id, 'Обработка...', 'status-processing');
      manager.setProgress(item.id, 20);

      try {
        const dataURL = await FileUtils.readAsDataURL(file);
        manager.setProgress(item.id, 50);
        const img = await FileUtils.loadImage(dataURL);
        
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        
        if (mime === 'image/jpeg') {
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        ctx.drawImage(img, 0, 0);
        
        manager.setProgress(item.id, 80);
        const blob = await FileUtils.canvasToBlob(canvas, mime, q);
        const newFilename = file.name.replace(/\.[^.]+$/, '') + '.' + ext;
        
        manager.setProgress(item.id, 100);
        manager.setStatus(item.id, ext.toUpperCase(), 'status-done');
        manager.setMeta(item.id, FileUtils.formatSize(blob.size));
        manager.addDownload(item.id, blob, newFilename);
        results.push({ blob, filename: newFilename });
      } catch (err) {
        errors++;
        manager.setStatus(item.id, 'Ошибка', 'status-error');
        console.error(err);
      }
    }

    if (results.length) {
      resultStats.innerHTML = `
        <div class="stat-card"><div class="stat-card__label">Конвертировано</div><div class="stat-card__value">${results.length}</div></div>
        <div class="stat-card stat-green"><div class="stat-card__label">Статус</div><div class="stat-card__value">Готово</div></div>
      `;
      UIUtils.showBatchResult({ resultArea, downloadAllBtn: dlAllBtn }, results.length);
      Toast.success('Конвертация завершена.');
    }
    if (errors) {
      Toast.error('Не удалось обработать ' + FileUtils.formatFilesCount(errors) + '.');
    }

    convertBtn.disabled = false;
    UIUtils.setBatchLocked(manager, [clearBtn, dlAllBtn, previewBtn], false);
    convertBtn.innerHTML = 'Конвертировать всё';
  });

  dlAllBtn.addEventListener('click', async () => {
    await FileUtils.downloadZip(results, 'akd-converted.zip');
  });

})();
</script>
</body>
</html>
